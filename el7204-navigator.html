<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EL7204 Free Navigator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #111827; color: #f3f4f6; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        #header {
            background: #1f2937;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #374151;
            flex-shrink: 0;
        }
        #connect-btn {
            background: #2563eb; border: none; color: white;
            padding: 8px 16px; border-radius: 8px; cursor: pointer;
            font-size: 14px; font-weight: 500; white-space: nowrap;
        }
        #connect-btn.connected  { background: #059669; }
        #connect-btn.connecting { background: #d97706; }

        #sim-btn {
            background: transparent; border: 1px solid #4b5563; color: #9ca3af;
            padding: 8px 12px; border-radius: 8px; cursor: pointer;
            font-size: 13px; white-space: nowrap;
        }
        #sim-btn.active { border-color: #f59e0b; color: #f59e0b; }

        #debug-btn {
            background: #374151; border: 1px solid #4b5563; color: #d1d5db;
            padding: 8px 12px; border-radius: 8px; cursor: pointer;
            font-size: 13px; white-space: nowrap;
        }
        #debug-btn.active { background: #991b1b; color: white; border-color: #ef4444; }

        #status {
            font-size: 12px; color: #9ca3af; flex: 1;
            min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        #stats {
            background: #111827; padding: 8px 0;
            display: flex; border-bottom: 1px solid #1f2937;
            flex-shrink: 0; overflow-x: auto;
        }
        .stat {
            display: flex; flex-direction: column; align-items: center;
            padding: 3px 12px; border-right: 1px solid #1f2937;
            min-width: 60px; flex-shrink: 0;
        }
        .stat:last-child { border-right: none; }
        .stat-value { font-size: 18px; font-weight: 700; color: #60a5fa; line-height: 1.2; }
        .stat-value.green { color: #34d399; }
        .stat-label { font-size: 10px; color: #6b7280; text-transform: uppercase; margin-top: 2px; }

        #map-container { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }

        #compass {
            position: absolute; bottom: 50px; right: 10px;
            background: rgba(17,24,39,0.88); border: 1px solid #374151;
            border-radius: 50%; width: 46px; height: 46px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; z-index: 1000;
        }

        #debug {
            position: absolute; top: 8px; left: 8px;
            background: rgba(0,0,0,0.85); color: #4ade80;
            font-size: 11px; font-family: monospace;
            padding: 8px 12px; border-radius: 6px;
            z-index: 1000; display: none;
            max-width: 280px; word-break: break-all; line-height: 1.6;
            border: 1px solid #22c55e;
        }

        #footer {
            background: #1f2937; padding: 6px 14px;
            font-size: 11px; color: #9ca3af;
            text-align: center; flex-shrink: 0;
            border-top: 1px solid #374151;
        }
    </style>
</head>
<body>

<div id="header">
    <button id="connect-btn" onclick="connectBluetooth()">📡 Connecter</button>
    <button id="sim-btn"     onclick="toggleSimulation()">▶ Simuler</button>
    <button id="debug-btn"   onclick="toggleDebug()">🐛 Debug</button>
    <span id="status">En attente de connexion...</span>
</div>

<div id="stats">
    <div class="stat"><span class="stat-value green" id="val-speed">0.0</span><span class="stat-label">km/h</span></div>
    <div class="stat"><span class="stat-value" id="val-cadence">—</span><span class="stat-label">rpm/spm</span></div>
    <div class="stat"><span class="stat-value" id="val-power">—</span><span class="stat-label">watts</span></div>
    <div class="stat"><span class="stat-value" id="val-calories">0</span><span class="stat-label">kcal</span></div>
    <div class="stat"><span class="stat-value" id="val-distance">0.00</span><span class="stat-label">km</span></div>
    <div class="stat"><span class="stat-value" id="val-time">0:00</span><span class="stat-label">temps</span></div>
</div>

<div id="map-container">
    <div id="map"></div>
    <div id="compass">➡️</div>
    <div id="debug"></div>
</div>

<div id="footer">Clique sur la carte pour changer de direction · Pédale pour avancer</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>

// ══════════════════════════════════════════════════════════════
//  CARTE / GEOGRAPHIE
// ══════════════════════════════════════════════════════════════
let pos       = { lat: 50.6418, lng: 5.5721 }; // Position initiale
let heading   = 90; 
let mapDistKm = 0;
let startTime = null;
let currentSpeed = 0; 

const map = L.map('map', { center: [pos.lat, pos.lng], zoom: 16 });

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 19
}).addTo(map);

const playerMarker = L.marker([pos.lat, pos.lng], {
    icon: L.divIcon({
        html: '<div style="width:18px;height:18px;background:#3b82f6;border:3px solid white;border-radius:50%;box-shadow:0 0 0 3px rgba(59,130,246,0.4);"></div>',
        iconSize: [18, 18], iconAnchor: [9, 9], className: ''
    })
}).addTo(map);

const pathCoords = [[pos.lat, pos.lng]];
const pathLine   = L.polyline(pathCoords, { color: '#3b82f6', weight: 3, opacity: 0.65 }).addTo(map);

let destMarker = null;

map.on('click', e => {
    heading = bearing(pos.lat, pos.lng, e.latlng.lat, e.latlng.lng);
    if (destMarker) map.removeLayer(destMarker);
    destMarker = L.circleMarker(e.latlng, {
        radius: 8, color: '#f59e0b', fillColor: '#fbbf24', fillOpacity: 0.55, weight: 2
    }).addTo(map);
    updateCompass();
    setStatus(`Direction configurée : ${Math.round(heading)}°`);
});

function bearing(lat1, lng1, lat2, lng2) {
    const r = Math.PI / 180;
    const y = Math.sin((lng2 - lng1) * r) * Math.cos(lat2 * r);
    const x = Math.cos(lat1 * r) * Math.sin(lat2 * r) - Math.sin(lat1 * r) * Math.cos(lat2 * r) * Math.cos((lng2 - lng1) * r);
    return ((Math.atan2(y, x) / r) + 360) % 360;
}

function moveByMeters(meters) {
    const hr = heading * Math.PI / 180;
    pos.lat += (meters * Math.cos(hr)) / 111000;
    pos.lng += (meters * Math.sin(hr)) / (111000 * Math.cos(pos.lat * Math.PI / 180));
    const ll = [pos.lat, pos.lng];
    playerMarker.setLatLng(ll);
    pathCoords.push(ll);
    pathLine.setLatLngs(pathCoords);
    map.panTo(ll, { animate: true, duration: 0.8 });
    mapDistKm += meters / 1000;
    document.getElementById('val-distance').textContent = mapDistKm.toFixed(2);
}

function updateCompass() {
    const icons = ['⬆️','↗️','➡️','↘️','⬇️','↙️','⬅️','↖️'];
    document.getElementById('compass').textContent = icons[Math.round(heading / 45) % 8];
}

// ══════════════════════════════════════════════════════════════
//  BLUETOOTH / MULTI-PARSING FTMS (Inspiré de Decathlon)
// ══════════════════════════════════════════════════════════════
const FTMS_SERVICE     = 0x1826;
const ELLIPTICAL_DATA  = 0x2ACE; // Données Elliptique
const INDOOR_BIKE_DATA = 0x2AD2; // Données Vélo (Souvent utilisé par Domyos)
const TREADMILL_DATA   = 0x2ACD; // Données Tapis

let btDevice = null;
let usedUUID = null; // Contiendra le protocole détecté
let debugActive = false;

async function connectBluetooth() {
    if (!navigator.bluetooth) {
        setStatus('⚠️ Web Bluetooth non disponible. Utilise Chrome.');
        return;
    }
    const btn = document.getElementById('connect-btn');
    btn.className = 'connecting';
    btn.textContent = '⏳ Scan...';
    setStatus('Sélectionne ton appareil Domyos...');

    try {
        btDevice = await navigator.bluetooth.requestDevice({
             acceptAllDevices: true,
             optionalServices: [FTMS_SERVICE]
        });

        btDevice.addEventListener('gattserverdisconnected', onDisconnected);

        const server  = await btDevice.gatt.connect();
        setStatus('Accès aux données de la console...');
        const service = await server.getPrimaryService(FTMS_SERVICE);

        // Détection dynamique du type de firmware de la console
        let char = null;
        for (const uuid of [ELLIPTICAL_DATA, INDOOR_BIKE_DATA, TREADMILL_DATA]) {
            try {
                char = await service.getCharacteristic(uuid);
                usedUUID = uuid; // On stocke le profil qui a répondu
                break;
            } catch (_) {}
        }
        
        if (!char) throw new Error('Appareil incompatible avec le protocole standard FTMS');

        await char.startNotifications();
        char.addEventListener('characteristicvaluechanged', parseFTMS);

        btn.className = 'connected';
        btn.textContent = `🟢 Connecté`;
        
        let typeAppareil = usedUUID === ELLIPTICAL_DATA ? "Elliptique" : (usedUUID === INDOOR_BIKE_DATA ? "Vélo (Domyos Core)" : "Tapis");
        setStatus(`Profil détecté : ${typeAppareil}. PÉDALE POUR BIEN ACTIVER !`);
        
        if (!startTime) startTime = Date.now();

    } catch (err) {
        btn.className = '';
        btn.textContent = '📡 Connecter';
        setStatus(err.name === 'NotFoundError' ? 'Scan annulé.' : `Erreur: ${err.message}`);
    }
}

function onDisconnected() {
    const btn = document.getElementById('connect-btn');
    btn.className = '';
    btn.textContent = '📡 Connecter';
    currentSpeed = 0;
    setStatus('Console déconnectée.');
}

// Routeur de décodage dynamique selon l'appareil détecté
function parseFTMS(event) {
    try {
        const d = event.target.value;
        if (d.byteLength < 3) return;

        // Met à jour la boîte noire de debug si elle est affichée
        if (debugActive) debugBytes(d);

        // Appel du décodeur approprié
        if (usedUUID === INDOOR_BIKE_DATA) {
            parseIndoorBike(d);
        } else {
            parseCrossTrainer(d);
        }

        if (!startTime) startTime = Date.now();
    } catch (err) {
        console.error(err);
    }
}

// Décodeur Spécifique Profil Vélo (Utilisé en interne par 90% des consoles Domyos)
function parseIndoorBike(d) {
    const flags = d.getUint16(0, true);
    let off = 2;

    // Vitesse (Bit 0 à 0 = présent)
    if ((flags & 0x0001) === 0 && off + 2 <= d.byteLength) {
        currentSpeed = d.getUint16(off, true) * 0.01;
        document.getElementById('val-speed').textContent = currentSpeed.toFixed(1);
        off += 2;
    }
    if (flags & 0x0002) off += 2; // Average Speed

    // Cadence (Bit 2 = présent)
    if (flags & 0x0004 && off + 2 <= d.byteLength) {
        let cadence = d.getUint16(off, true) * 0.5; // Résolution 0.5 rpm
        document.getElementById('val-cadence').textContent = Math.round(cadence);
        off += 2;
    }
    if (flags & 0x0008) off += 2; // Average Cadence
    if (flags & 0x0010) off += 3; // Total Distance
    if (flags & 0x0020) off += 2; // Resistance Level

    // Puissance Watts (Bit 6 = présent)
    if (flags & 0x0040 && off + 2 <= d.byteLength) {
        document.getElementById('val-power').textContent = d.getInt16(off, true);
        off += 2;
    }
    if (flags & 0x0080) off += 2; // Average Power

    // Calories (Bit 8 = présent)
    if (flags & 0x0100 && off + 2 <= d.byteLength) {
        document.getElementById('val-calories').textContent = d.getUint16(off, true);
    }
}

// Décodeur Spécifique Profil Elliptique Standard
function parseCrossTrainer(d) {
    const flags = d.getUint16(0, true);
    let off = 2;

    if ((flags & 0x0001) === 0 && off + 2 <= d.byteLength) {
        currentSpeed = d.getUint16(off, true) * 0.01;
        document.getElementById('val-speed').textContent = currentSpeed.toFixed(1);
        off += 2;
    }
    if (flags & 0x0002) off += 2; 
    if (flags & 0x0004) off += 3; 

    // Cadence / Step Rate
    if (flags & 0x0008 && off + 2 <= d.byteLength) {
        document.getElementById('val-cadence').textContent = d.getUint16(off, true);
        off += 4; 
    }
    if (flags & 0x0010) off += 2; 
    if (flags & 0x0020) off += 4; 
    if (flags & 0x0040) off += 4; 
    if (flags & 0x0080) off += 2; 

    // Puissance Watts
    if (flags & 0x0100 && off + 2 <= d.byteLength) {
        document.getElementById('val-power').textContent = d.getInt16(off, true);
        off += 2;
    }
    if (flags & 0x0200) off += 2; 

    // Calories
    if (flags & 0x0400 && off + 2 <= d.byteLength) {
        document.getElementById('val-calories').textContent = d.getUint16(off, true);
    }
}

// ══════════════════════════════════════════════════════════════
//  BOUCLE DE MISE A JOUR (1 Hz) & SIMULATION
// ══════════════════════════════════════════════════════════════
setInterval(() => {
    if (currentSpeed > 0.2) {
        moveByMeters(currentSpeed / 3.6);
    }
    if (startTime) {
        const sec  = Math.floor((Date.now() - startTime) / 1000);
        const mm   = Math.floor(sec / 60);
        const ss   = (sec % 60).toString().padStart(2, '0');
        document.getElementById('val-time').textContent = `${mm}:${ss}`;
    }
}, 1000);

let simInterval = null, simT = 0;
function toggleSimulation() {
    const btn = document.getElementById('sim-btn');
    if (simInterval) {
        clearInterval(simInterval);
        simInterval   = null;
        currentSpeed  = 0;
        document.getElementById('val-speed').textContent = '0.0';
        btn.classList.remove('active');
        btn.textContent = '▶ Simuler';
        setStatus('Simulation arrêtée.');
    } else {
        if (!startTime) startTime = Date.now();
        btn.classList.add('active');
        btn.textContent = '⏹ Stop';
        setStatus('Simulation active.');
        simInterval = setInterval(() => {
            simT += 0.08;
            currentSpeed = 6.5 + 2.0 * Math.sin(simT);
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('val-speed').textContent    = currentSpeed.toFixed(1);
            document.getElementById('val-cadence').textContent  = Math.round(55 + 10 * Math.sin(simT));
            document.getElementById('val-power').textContent    = Math.round(110 + 30 * Math.sin(simT));
            document.getElementById('val-calories').textContent = Math.round(elapsed / 60 * 8);
        }, 1000);
    }
}

// Gestion simplifiée du Debug
function toggleDebug() {
    const btn = document.getElementById('debug-btn');
    debugActive = !debugActive;
    document.getElementById('debug').style.display = debugActive ? 'block' : 'none';
    btn.classList.toggle('active', debugActive);
}

function debugBytes(dataView) {
    const bytes = Array.from(new Uint8Array(dataView.buffer))
        .map(b => b.toString(16).padStart(2, '0').toUpperCase())
        .join(' ');
    const flags = dataView.getUint16(0, true).toString(2).padStart(16, '0');
    document.getElementById('debug').innerHTML = `<strong>UUID:</strong> 0x${usedUUID ? usedUUID.toString(16).toUpperCase() : '??'}<br><strong>FLAGS:</strong> ${flags}<br><strong>BYTES:</strong> ${bytes}`;
}

function setStatus(msg) {
    document.getElementById('status').textContent = msg;
}

// Synchronisation de départ avec le GPS si disponible
if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(p => {
        pos.lat = p.coords.latitude;
        pos.lng = p.coords.longitude;
        playerMarker.setLatLng([pos.lat, pos.lng]);
        pathCoords[0] = [pos.lat, pos.lng];
        map.setView([pos.lat, pos.lng], 16);
        setStatus('📍 Position GPS synchronisée. Prêt pour connexion !');
    });
}

updateCompass();
</script>
</body>
</html>
