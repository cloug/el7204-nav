<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EL7204 Free Navigator - Mode Hybride</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #111827; color: #f3f4f6; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        #header {
            background: #1f2937; padding: 10px 14px;
            display: flex; align-items: center; gap: 10px;
            border-bottom: 1px solid #374151; flex-shrink: 0;
        }
        #connect-btn {
            background: #2563eb; border: none; color: white;
            padding: 8px 16px; border-radius: 8px; cursor: pointer;
            font-size: 14px; font-weight: 500; white-space: nowrap;
        }
        #connect-btn.connected  { background: #059669; }
        #connect-btn.connecting { background: #d97706; }

        #sim-btn {
            background: transparent; border: 1px solid #4b5563; color: #9ca3af;
            padding: 8px 12px; border-radius: 8px; cursor: pointer;
            font-size: 13px; white-space: nowrap;
        }
        #sim-btn.active { border-color: #f59e0b; color: #f59e0b; }

        #status {
            font-size: 12px; color: #9ca3af; flex: 1;
            min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        /* SUPER CONSOLE DE TRACAGE EN TEMPS REEL */
        #log-box {
            background: #000000; color: #22c55e; font-family: monospace;
            font-size: 11px; padding: 8px 14px; height: 110px;
            overflow-y: auto; border-bottom: 1px solid #1f2937; flex-shrink: 0;
            line-height: 1.5; box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
        }

        #control-panel {
            background: #111827; padding: 10px 14px;
            display: flex; align-items: center; justify-content: center; gap: 16px;
            border-bottom: 1px solid #1f2937; flex-shrink: 0;
        }
        .panel-label { font-size: 13px; font-weight: 600; color: #9ca3af; text-transform: uppercase; }
        .ctrl-btn {
            background: #374151; border: 1px solid #4b5563; color: white;
            width: 44px; height: 44px; border-radius: 50%; cursor: pointer; 
            font-size: 18px; display: flex; align-items: center; justify-content: center;
            touch-action: manipulation;
        }
        .ctrl-btn:active { background: #4b5563; }
        #res-val { font-size: 22px; font-weight: 800; color: #f59e0b; min-width: 32px; text-align: center; }

        #stats {
            background: #1f2937; padding: 10px 0;
            display: flex; border-bottom: 1px solid #374151;
            flex-shrink: 0; overflow-x: auto;
        }
        .stat {
            display: flex; flex-direction: column; align-items: center;
            padding: 3px 14px; border-right: 1px solid #374151;
            min-width: 65px; flex-shrink: 0;
        }
        .stat:last-child { border-right: none; }
        .stat-value { font-size: 20px; font-weight: 700; color: #60a5fa; line-height: 1.2; }
        .stat-value.green { color: #34d399; }
        .stat-value.amber { color: #f59e0b; }
        .stat-label { font-size: 10px; color: #9ca3af; text-transform: uppercase; margin-top: 2px; }

        #map-container { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }

        #compass {
            position: absolute; bottom: 50px; right: 10px;
            background: rgba(17,24,39,0.88); border: 1px solid #374151;
            border-radius: 50%; width: 46px; height: 46px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; z-index: 1000;
        }

        #footer {
            background: #1f2937; padding: 6px 14px;
            font-size: 11px; color: #9ca3af;
            text-align: center; flex-shrink: 0;
            border-top: 1px solid #374151;
        }
    </style>
</head>
<body>

<div id="header">
    <button id="connect-btn" onclick="connectBluetooth()">📡 Connecter</button>
    <button id="sim-btn"     onclick="toggleSimulation()">▶ Simuler</button>
    <span id="status">Détection de protocole active.</span>
</div>

<div id="log-box">Système paré. En attente de jumelage...</div>

<div id="control-panel">
    <span class="panel-label">⚡ Difficulté</span>
    <button class="ctrl-btn" onclick="adjustResistance(-1)">➖</button>
    <span id="res-val">1</span>
    <button class="ctrl-btn" onclick="adjustResistance(1)">➕</button>
</div>

<div id="stats">
    <div class="stat"><span class="stat-value green" id="val-speed">0.0</span><span class="stat-label">km/h</span></div>
    <div class="stat"><span class="stat-value" id="val-cadence">—</span><span class="stat-label">spm</span></div>
    <div class="stat"><span class="stat-value" id="val-power">—</span><span class="stat-label">watts</span></div>
    <div class="stat"><span class="stat-value amber" id="val-res">1</span><span class="stat-label">Niveau</span></div>
    <div class="stat"><span class="stat-value" id="val-calories">0</span><span class="stat-label">kcal</span></div>
    <div class="stat"><span class="stat-value" id="val-distance">0.00</span><span class="stat-label">km</span></div>
    <div class="stat"><span class="stat-value" id="val-time">0:00</span><span class="stat-label">temps</span></div>
</div>

<div id="map-container">
    <div id="map"></div>
    <div id="compass">➡️</div>
</div>

<div id="footer">Pilotez sur la carte · Ajustez la difficulté via ➖/➕</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>

// ══════════════════════════════════════════════════════════════
//  GEOGRAPHIE & MAP
// ══════════════════════════════════════════════════════════════
let pos = { lat: 50.6418, lng: 5.5721 }; 
let heading = 90; let mapDistKm = 0; let startTime = null; let currentSpeed = 0; 

const map = L.map('map', { center: [pos.lat, pos.lng], zoom: 16 });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM', maxZoom: 19 }).addTo(map);

const playerMarker = L.marker([pos.lat, pos.lng], {
    icon: L.divIcon({ html: '<div style="width:18px;height:18px;background:#3b82f6;border:3px solid white;border-radius:50%;"></div>', iconSize: [18, 18], iconAnchor: [9, 9] })
}).addTo(map);

const pathCoords = [[pos.lat, pos.lng]];
const pathLine = L.polyline(pathCoords, { color: '#3b82f6', weight: 3, opacity: 0.65 }).addTo(map);
let destMarker = null;

map.on('click', e => {
    heading = bearing(pos.lat, pos.lng, e.latlng.lat, e.latlng.lng);
    if (destMarker) map.removeLayer(destMarker);
    destMarker = L.circleMarker(e.latlng, { radius: 8, color: '#f59e0b', fillColor: '#fbbf24', fillOpacity: 0.5, weight: 2 }).addTo(map);
    updateCompass();
});

function bearing(lat1, lng1, lat2, lng2) {
    const r = Math.PI / 180;
    const y = Math.sin((lng2 - lng1) * r) * Math.cos(lat2 * r);
    const x = Math.cos(lat1 * r) * Math.sin(lat2 * r) - Math.sin(lat1 * r) * Math.cos(lat2 * r) * Math.cos((lng2 - lng1) * r);
    return ((Math.atan2(y, x) / r) + 360) % 360;
}

function moveByMeters(meters) {
    const hr = heading * Math.PI / 180;
    pos.lat += (meters * Math.cos(hr)) / 111000;
    pos.lng += (meters * Math.sin(hr)) / (111000 * Math.cos(pos.lat * Math.PI / 180));
    const ll = [pos.lat, pos.lng];
    playerMarker.setLatLng(ll);
    pathCoords.push(ll);
    pathLine.setLatLngs(pathCoords);
    map.panTo(ll, { animate: true, duration: 0.8 });
    mapDistKm += meters / 1000;
    document.getElementById('val-distance').textContent = mapDistKm.toFixed(2);
}

function updateCompass() {
    const icons = ['⬆️','↗️','➡️','↘️','⬇️','↙️','⬅️','↖️'];
    document.getElementById('compass').textContent = icons[Math.round(heading / 45) % 8];
}

// ══════════════════════════════════════════════════════════════
//  MOTEUR BLUETOOTH HYBRIDE : STANDARD FTMS + DECAT PRIVE
// ══════════════════════════════════════════════════════════════
const FTMS_SERVICE   = 0x1826;
const DOMYOS_SERVICE = 0xFEB2; // L'identifiant secret de Decathlon

let btDevice = null;
let activeServiceMode = "NONE"; // "FTMS" ou "DOMYOS"
let targetWriteChar = null; 
let currentResistance = 1;

function log(text) {
    const box = document.getElementById('log-box');
    box.innerHTML += `<br>➡️ ${text}`;
    box.scrollTop = box.scrollHeight;
}

async function connectBluetooth() {
    if (!navigator.bluetooth) {
        setStatus('⚠️ Navigateur incompatible.');
        return;
    }
    const btn = document.getElementById('connect-btn');
    btn.className = 'connecting'; btn.textContent = '⏳ Scan...';
    document.getElementById('log-box').innerHTML = "Lancement de la recherche Bluetooth...";

    try {
        btDevice = await navigator.bluetooth.requestDevice({
             acceptAllDevices: true,
             optionalServices: [FTMS_SERVICE, DOMYOS_SERVICE] // On déclare les deux au navigateur
        });

        btDevice.addEventListener('gattserverdisconnected', onDisconnected);
        log("Console sélectionnée. Connexion matérielle en cours...");
        
        const server = await btDevice.gatt.connect();
        log("Liaison établie. Analyse des puces internes...");

        let mainService = null;
        
        // TENTATIVE 1 : Tester si la machine supporte le standard FTMS
        try {
            mainService = await server.getPrimaryService(FTMS_SERVICE);
            activeServiceMode = "FTMS";
            log("✅ Mode STANDARD FTMS (0x1826) détecté.");
        } catch(e) {
            log("⚠️ Absence de puce FTMS standard. Passage en MODE PROPRIÉTAIRE DECATHLON (0xFEB2)...");
        }

        // TENTATIVE 2 : Si échec, on force la connexion sur le protocole Domyos privé
        if (!mainService) {
            try {
                mainService = await server.getPrimaryService(DOMYOS_SERVICE);
                activeServiceMode = "DOMYOS";
                log("🎯 Connexion validée sur le protocole privé Domyos (0xFEB2).");
            } catch(err2) {
                throw new Error("L'appareil refuse d'ouvrir ses services de données.");
            }
        }

        // ═══════════════════════════════════════════════════════
        // STRATÉGIE DE RECHERCHE SELON LE PROTOCOLE FILTRÉ
        // ═══════════════════════════════════════════════════════
        if (activeServiceMode === "FTMS") {
            // Configuration classique FTMS
            let dataChar = await mainService.getCharacteristic(0x2AD2).catch(() => mainService.getCharacteristic(0x2ACE));
            await dataChar.startNotifications();
            dataChar.addEventListener('characteristicvaluechanged', parseStandardFTMS);
            
            targetWriteChar = await mainService.getCharacteristic(0x2AD9);
            await targetWriteChar.writeValueWithResponse(new Uint8Array([0x00]));
            await targetWriteChar.writeValueWithResponse(new Uint8Array([0x07]));
            log("🚀 Console FTMS prête. Pédalez !");
            
        } else if (activeServiceMode === "DOMYOS") {
            // Exploration forcée de l'architecture Decathlon
            log("Scan des transmetteurs privés...");
            const characteristics = await mainService.getCharacteristics();
            log(`Trouvé : ${characteristics.length} flux de communication.`);

            for (let ch of characteristics) {
                const shortUUID = ch.uuid.substring(4, 8).toUpperCase();
                log(`Flux 0x${shortUUID} détecté. [Notify:${ch.properties.notify} | Write:${ch.properties.write}]`);

                // On s'abonne à tous les flux émetteurs de la console pour ne rien rater
                if (ch.properties.notify) {
                    try {
                        await ch.startNotifications();
                        ch.addEventListener('characteristicvaluechanged', (e) => handleDomyosRawBytes(e, shortUUID));
                        log(`⚡ Écoute active branchée sur le flux 0x${shortUUID}`);
                    } catch(nErr) { log(`❌ Liaison impossible sur 0x${shortUUID}`); }
                }

                // Détection de la commande de difficulté (historiquement sur la caractéristique FED4)
                if (shortUUID === "FED4" || (!targetWriteChar && ch.properties.write)) {
                    targetWriteChar = ch;
                    log(`⚙️ Canal de contrôle de charge assigné à 0x${shortUUID}`);
                }
            }
            
            // Handshake d'initialisation forcé pour réveiller le protocole Domyos privé
            if (targetWriteChar) {
                try {
                    log("Envoi du signal d'activation à la console...");
                    // Envoi d'une trame d'éveil standard Domyos (Start/Wake)
                    await targetWriteChar.writeValueWithResponse(new Uint8Array([0xF0, 0x01, 0x01, 0x92, 0xF1])).catch(() => {});
                    // Envoi de repli (Simple octet de synchronisation)
                    await targetWriteChar.writeValueWithResponse(new Uint8Array([0x55, 0x01])).catch(() => {});
                } catch(wErr) {}
            }
            log("🚀 Écouteur Decathlon actif ! Commencez à pédaler pour voir les données arriver.");
        }

        btn.className = 'connected'; btn.textContent = `🟢 Connecté`;
        setStatus("Connecté avec succès !");
        if (!startTime) startTime = Date.now();

    } catch (err) {
        btn.className = ''; btn.textContent = '📡 Connecter';
        log("❌ CRASH : " + err.message);
        setStatus(`Connexion impossible.`);
    }
}

// ══════════════════════════════════════════════════════════════
//  DECODEUR SPECIAL DES OCTETS DOMYOS/DECATHLON
// ══════════════════════════════════════════════════════════════
function handleDomyosRawBytes(event, sourceUUID) {
    const d = event.target.value;
    if (d.byteLength < 3) return;

    // Conversion de la trame binaire reçue en texte Hexadécimal lisible
    const hex = Array.from(new Uint8Array(d.buffer))
        .map(b => b.toString(16).padStart(2, '0').toUpperCase())
        .join(' ');

    // On affiche en temps réel les données de mouvements reçues dans le bandeau vert
    log(`[Reçu de 0x${sourceUUID}]: ${hex}`);

    // DÉCODAGE UNIVERSEL DU PACKET DOMYOS (Trame standard à 19 octets ou trame compacte)
    // Format typique Domyos : [Header F0] ... [Vitesse] [Cadence] ... [F1]
    if (d.getUint8(0) === 0xF0 || d.byteLength >= 10) {
        try {
            let speed = 0; let cadence = 0; let power = 0; let level = 1;

            if (d.byteLength === 19) { // Modèle classique complet
                speed   = ((d.getUint8(3) << 8) | d.getUint8(4)) * 0.1; 
                cadence = d.getUint8(5);
                level   = d.getUint8(11);
            } else { // Modèle alternatif (lecture dynamique par décalage)
                speed   = d.getUint16(2, true) * 0.1;
                cadence = d.getUint8(4);
                if (d.byteLength > 6) level = d.getUint8(6);
            }

            // Filtrage des données aberrantes
            if (speed > 0 && speed < 99) {
                currentSpeed = speed;
                document.getElementById('val-speed').textContent = currentSpeed.toFixed(1);
            }
            if (cadence > 0) document.getElementById('val-cadence').textContent = cadence;
            
            if (level > 0 && level <= 32) {
                currentResistance = level;
                document.getElementById('val-res').textContent = level;
                document.getElementById('res-val').textContent = level;
            }
        } catch(e) {}
    }
    if (!startTime) startTime = Date.now();
}

// Ajustement de la difficulté en mode Hybride
async function adjustResistance(delta) {
    let target = currentResistance + delta;
    if (target < 1) target = 1; if (target > 32) target = 32;
    
    currentResistance = target;
    document.getElementById('res-val').textContent = target;
    document.getElementById('val-res').textContent = target;

    if (targetWriteChar) {
        try {
            log(`Changement de charge demandé ➡️ ${target}`);
            if (activeServiceMode === "FTMS") {
                await targetWriteChar.writeValueWithResponse(new Uint8Array([0x04, target]));
            } else {
                // Protocole propriétaire : Trame structurelle de modification de charge Decathlon [F0, Opcode, Valeur, Checksum, F1]
                let checksum = (0x02 + target) & 0xFF;
                let domyosFrame = new Uint8Array([0xF0, 0x02, target, checksum, 0xF1]);
                
                // On tente l'envoi de la trame construite, sinon la valeur brute simple
                await targetWriteChar.writeValueWithResponse(domyosFrame).catch(async () => {
                    await targetWriteChar.writeValueWithResponse(new Uint8Array([target]));
                });
            }
        } catch (e) { log("Erreur d'écriture résistance : " + e.message); }
    } else { log("Impossible : aucun transmetteur de commande détecté."); }
}

// Décodeur classique FTMS (Utilisé uniquement si la machine bascule dessus)
function parseStandardFTMS(event) {
    const d = event.target.value;
    const flags = d.getUint16(0, true);
    let off = 2;
    if ((flags & 0x0001) === 0) { currentSpeed = d.getUint16(off, true) * 0.01; document.getElementById('val-speed').textContent = currentSpeed.toFixed(1); off += 2; }
    if (flags & 0x0002) off += 2;
    if (flags & 0x0004) { document.getElementById('val-cadence').textContent = Math.round(d.getUint16(off, true) * 0.5); off += 2; }
    if (flags & 0x0008) off += 2; if (flags & 0x0010) off += 3;
    if (flags & 0x0020) { const res = d.getInt16(off, true); document.getElementById('val-res').textContent = res; currentResistance = res; document.getElementById('res-val').textContent = res; off += 2; }
    if (flags & 0x0040) { document.getElementById('val-power').textContent = d.getInt16(off, true); off += 2; }
}

function onDisconnected() {
    const btn = document.getElementById('connect-btn');
    btn.className = ''; btn.textContent = '📡 Connecter';
    currentSpeed = 0; targetWriteChar = null;
    log("🔌 Déconnexion physique de la console.");
    setStatus('Déconnecté.');
}

// ══════════════════════════════════════════════════════════════
//  BOUCLE DE MISE A JOUR TEMPORELLE & SIMULATEUR
// ══════════════════════════════════════════════════════════════
setInterval(() => {
    if (currentSpeed > 0.2) moveByMeters(currentSpeed / 3.6);
    if (startTime) {
        const sec = Math.floor((Date.now() - startTime) / 1000);
        document.getElementById('val-time').textContent = `${Math.floor(sec / 60)}:${(sec % 60).toString().padStart(2, '0')}`;
    }
}, 1000);

let simInterval = null, simT = 0;
function toggleSimulation() {
    const btn = document.getElementById('sim-btn');
    if (simInterval) {
        clearInterval(simInterval); simInterval = null; currentSpeed = 0;
        document.getElementById('val-speed').textContent = '0.0';
        btn.classList.remove('active'); btn.textContent = '▶ Simuler';
    } else {
        if (!startTime) startTime = Date.now();
        btn.classList.add('active'); btn.textContent = '⏹ Stop';
        simInterval = setInterval(() => {
            simT += 0.08; currentSpeed = 7.0 + 2.5 * Math.sin(simT);
            document.getElementById('val-speed').textContent = currentSpeed.toFixed(1);
            document.getElementById('val-cadence').textContent = Math.round(55 + 12 * Math.sin(simT));
        }, 1000);
    }
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }
updateCompass();
</script>
</body>
</html>
